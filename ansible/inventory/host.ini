# ─────────────────────────────────────────────
# Ansible Inventory — Static
# ─────────────────────────────────────────────
# UPDATE these IPs after running: terraform output
# Run from terraform/environments/dev:
#   terraform output -json

[webservers]
# Replace with your actual EC2 public IPs:
# 1.2.3.4 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/terraform-poc-key.pem
# 5.6.7.8 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/terraform-poc-key.pem

[webservers:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/terraform-poc-key.pem
ansible_python_interpreter=/usr/bin/python3

[all:vars]
environment=dev
project_name=terraform-poc
