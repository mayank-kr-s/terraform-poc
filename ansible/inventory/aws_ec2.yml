# ─────────────────────────────────────────────
# AWS Dynamic Inventory (Optional — Advanced)
# ─────────────────────────────────────────────
# Requires: ansible-galaxy collection install amazon.aws
# And:      pip3 install boto3 botocore

plugin: amazon.aws.aws_ec2
regions:
  - us-east-1

filters:
  tag:Environment: dev
  tag:Project: terraform-poc
  instance-state-name: running

keyed_groups:
  - key: tags.Role
    prefix: role
    separator: "_"

hostnames:
  - public-ip-address   # Use public IP (change to private-ip-address if using VPN)

compose:
  ansible_user: "'ec2-user'"
  ansible_ssh_private_key_file: "'~/.ssh/terraform-poc-key.pem'"
