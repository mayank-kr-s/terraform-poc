---
# ─────────────────────────────────────────────
#  Nginx Role — Web Server & Reverse Proxy
# ─────────────────────────────────────────────

- name: Install Nginx
  yum:
    name: nginx
    state: present

- name: Create web root directory
  file:
    path: /opt/webapp
    state: directory
    owner: nginx
    group: nginx
    mode: "0755"

- name: Deploy application index page
  template:
    src: index.html.j2
    dest: /opt/webapp/index.html
    owner: nginx
    group: nginx
    mode: "0644"

- name: Deploy Nginx main configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Nginx
  register: nginx_main_config

- name: Deploy Nginx site configuration
  template:
    src: default.conf.j2
    dest: /etc/nginx/conf.d/default.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart Nginx
  register: nginx_site_config

- name: Remove default Nginx welcome page
  file:
    path: /usr/share/nginx/html/index.html
    state: absent

- name: Test Nginx configuration
  command: nginx -t
  changed_when: false
  register: nginx_test

- name: Display Nginx config test result
  debug:
    var: nginx_test.stderr

- name: Start and enable Nginx
  service:
    name: nginx
    state: started
    enabled: yes

- name: Verify Nginx is responding
  uri:
    url: "http://localhost:{{ nginx_port }}/health"
    return_content: yes
    status_code: 200
  register: health_check
  retries: 3
  delay: 5
  until: health_check.status == 200
